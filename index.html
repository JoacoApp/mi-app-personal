<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Mi App Personal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#0a0a0a; --bg2:#141414; --bg3:#1c1c1c; --bg4:#242424;
  --border:#2a2a2a; --border2:#333;
  --text:#f0f0f0; --text2:#aaa; --text3:#555;
  --accent:#7c3aed; --accent2:#a78bfa; --accent-bg:#1e1530;
  --green:#4ade80; --green-bg:#0f2a1a;
  --red:#f87171; --red-bg:#2a0f0f;
  --yellow:#fbbf24; --yellow-bg:#2a1f0a;
  --blue:#3b82f6; --orange:#f97316;
  --font:'Inter',sans-serif;
  --r:14px; --r-sm:10px;
}
/* Micro-interacciones */
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; transition: background 0.2s ease; }
button:active { transform: scale(0.96); }
.tnav-btn, .bnav-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

html,body{height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px;}
#app{height:100%; display:flex; flex-direction:column; max-width:500px; margin:0 auto; background:var(--bg); position:relative;}

/* TOP NAV MEJORADO */
.top-nav{background:var(--bg2); border-bottom:1px solid var(--border); padding:8px; display:flex; gap:6px; flex-shrink:0; align-items:center; overflow-x: auto; scrollbar-width: none;}
.top-nav::-webkit-scrollbar { display: none; }
.top-nav-inner{display:flex; gap:6px; flex:1;}
.tnav-btn{padding:6px 14px; border-radius:20px; border:1px solid var(--border2); background:transparent; color:var(--text3); font-size:11px; font-weight:600; cursor:pointer; white-space:nowrap;}
.tnav-btn.active{border-color:var(--accent); color:var(--accent2); background:var(--accent-bg); box-shadow: 0 0 10px rgba(124,58,237,0.2);}

/* BUSCADOR ESTILO PREMIUM */
.search-bar-container { padding: 0 14px 10px; background: var(--bg); display: none; }
.search-bar-container.open { display: block; animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
.search-input-wrapper { position: relative; display: flex; align-items: center; }
.search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 35px 10px 12px; color: var(--text); outline: none; }
.search-close { position: absolute; right: 10px; color: var(--text3); cursor: pointer; }

/* SCREENS */
.screen{display:none; flex:1; flex-direction:column; overflow:hidden;}
.screen.active{display:flex; animation: fadeIn 0.3s ease;}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.screen-body{flex:1; overflow-y:auto; padding:14px; -webkit-overflow-scrolling:touch;}

/* HEADER */
.header{padding:14px; display:flex; justify-content:space-between; align-items:flex-start;}
.header h1{font-size:22px; font-weight:700; letter-spacing: -0.5px;}

/* CARDS CON ICONOGRAFIA POR COLOR */
.card{background:var(--bg3); border:1px solid var(--border); border-radius:var(--r); padding:14px; margin-bottom:12px; position: relative; overflow: hidden;}
.cat-indicator { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }

/* REFUERZO DE COLOR POR CATEGORIA */
.c-comida { background: var(--orange); }
.c-salud { background: var(--red); }
.c-auto { background: var(--blue); }
.c-servicios { background: var(--accent); }
.c-hogar { background: var(--green); }
.c-varios { background: var(--text3); }

/* ESTILOS BOTONES */
.btn-fab{position:fixed; bottom:30px; right:20px; width:56px; height:56px; border-radius:28px; background:var(--accent); border:none; color:white; font-size:24px; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(0,0,0,0.4); z-index:90;}

/* ESTADISTICAS BARRA PROGRESO */
.stat-bar-bg { background: var(--bg4); height: 8px; border-radius: 4px; margin-top: 6px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease-out; }

/* MODALS */
.modal-overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:200; align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2); border-radius:24px 24px 0 0; padding:20px; width:100%; max-height:90vh; overflow-y:auto; border-top:1px solid var(--border); animation: slideUp 0.3s ease-out;}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* LOADER */
#loading{position:fixed; inset:0; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:500;}

</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p style="margin-top:20px; color:var(--text2)" id="loadingMsg">Iniciando...</p>
</div>

<div id="app" style="display:none;">
  <!-- TOP NAV -->
  <div class="top-nav">
    <div class="top-nav-inner">
      <button class="tnav-btn active" onclick="navigate('inicio')">Inicio</button>
      <button class="tnav-btn" onclick="navigate('movimientos')">Movimientos</button>
      <button class="tnav-btn" onclick="navigate('calendario')">Agenda</button>
      <button class="tnav-btn" onclick="navigate('mes')">MES</button>
      <button class="tnav-btn" onclick="navigate('alacena')">Alacena</button>
      <button class="tnav-btn" onclick="navigate('onix')">Onix</button>
      <button class="tnav-btn" onclick="navigate('notas')">Notas</button>
      <button class="tnav-btn" onclick="navigate('jc')">JC</button>
    </div>
    <div style="display:flex; gap:10px; margin-left:10px">
        <i class="ti ti-search" style="font-size:20px; color:var(--text2)" onclick="toggleSearch()"></i>
        <i class="ti ti-menu-2" style="font-size:20px; color:var(--text2)" onclick="openHamburger()"></i>
    </div>
  </div>

  <!-- BUSCADOR -->
  <div id="searchBar" class="search-bar-container">
    <div class="search-input-wrapper">
      <input type="text" class="search-input" id="globalSearchInput" placeholder="Buscar movimientos, notas..." oninput="doGlobalSearch()">
      <i class="ti ti-x search-close" onclick="toggleSearch()"></i>
    </div>
    <div id="searchResults" style="max-height: 300px; overflow-y: auto; margin-top:10px;"></div>
  </div>

  <!-- PANTALLAS (Simplificadas para el ejemplo, pero manteniendo tu lógica) -->
  <div class="screen active" id="screen-inicio">
    <div class="header">
      <div>
        <h1 id="inicio-greeting">Cargando...</h1>
        <p id="inicio-date" style="color:var(--text3)"></p>
      </div>
    </div>
    <div class="screen-body">
      <div id="alertasCard"></div>
      <div class="sec">Notas rápidas</div>
      <div id="notasRecCard"></div>
    </div>
  </div>

  <div class="screen" id="screen-movimientos">
    <div class="header"><h1>Movimientos</h1></div>
    <div class="screen-body">
      <div id="movList"></div>
      <div id="loadMoreMovs" style="text-align:center; padding:20px; display:none;">
          <button class="tnav-btn" onclick="loadNextPage()">Cargar más</button>
      </div>
    </div>
    <button class="btn-fab" onclick="openModal('modalMov')"><i class="ti ti-plus"></i></button>
  </div>

  <div class="screen" id="screen-mes">
    <div class="header"><h1>Resumen Mensual</h1></div>
    <div class="screen-body" id="mesContent"></div>
  </div>
  
  <!-- OTROS SCREENS... (se mantienen igual que tu versión anterior) -->

  <!-- MENU LATERAL -->
  <div class="hamburger-menu" id="hamburgerMenu" style="display:none; position:fixed; inset:0; z-index:300;">
    <div style="position:absolute; inset:0; background:rgba(0,0,0,0.7)" onclick="closeHamburger()"></div>
    <div style="position:absolute; right:0; top:0; bottom:0; width:260px; background:var(--bg2); padding:40px 20px;">
        <div class="ham-item" onclick="exportBackup()"><i class="ti ti-download"></i> Copia de Seguridad (JSON)</div>
        <div class="ham-item" onclick="openImportModal()"><i class="ti ti-file-import"></i> Importar Excel</div>
        <div class="ham-item" onclick="logout()"><i class="ti ti-logout"></i> Cerrar Sesión</div>
    </div>
  </div>
</div>

<script>
// CONFIGURACION SUPABASE (Aquí van tus llaves reales)
const SB_URL = 'https://tmzucfybqtklmlkgpexz.supabase.co';
const SB_KEY = 'TU_KEY_AQUI'; // Recordar actualizar con la tuya
const sb = supabase.createClient(SB_URL, SB_KEY);

let movimientos = [], notas = [], alacena = [], recordatorios = [];
let currentPage = 0;
const pageSize = 50;

// MAPEO DE COLORES PARA ICONOGRAFÍA
const catColors = {
    'Comida': 'var(--orange)',
    'Salud': 'var(--red)',
    'Vehículo': 'var(--blue)',
    'Combustible': 'var(--blue)',
    'Doméstica': 'var(--accent)',
    'Servicios': 'var(--accent)',
    'JC': 'var(--green)',
    'Hogar': 'var(--green)'
};

// --- LOGICA DE PAGINACION ---
async function loadMovimientos(append = false) {
    if (!append) { currentPage = 0; setLoading('Cargando movimientos...'); }
    
    const { data, error } = await sb.from('movimientos')
        .select('*')
        .order('fecha', { ascending: false })
        .range(currentPage * pageSize, (currentPage + 1) * pageSize - 1);

    if (!error) {
        if (append) movimientos = [...movimientos, ...data];
        else movimientos = data;
        
        renderMovimientos();
        document.getElementById('loadMoreMovs').style.display = data.length === pageSize ? 'block' : 'none';
    }
    document.getElementById('loading').style.display = 'none';
}

function loadNextPage() {
    currentPage++;
    loadMovimientos(true);
}

// --- BUSCADOR GLOBAL ---
function toggleSearch() {
    const bar = document.getElementById('searchBar');
    bar.classList.toggle('open');
    if (bar.classList.contains('open')) document.getElementById('globalSearchInput').focus();
    else document.getElementById('searchResults').innerHTML = '';
}

function doGlobalSearch() {
    const q = document.getElementById('globalSearchInput').value.toLowerCase();
    const results = document.getElementById('searchResults');
    if (q.length < 2) { results.innerHTML = ''; return; }

    const filteredMovs = movimientos.filter(m => 
        (m.detalle && m.detalle.toLowerCase().includes(q)) || 
        m.categoria.toLowerCase().includes(q)
    );
    
    const filteredNotas = notas.filter(n => n.texto.toLowerCase().includes(q));

    results.innerHTML = `
        <div class="sec">Resultados (${filteredMovs.length + filteredNotas.length})</div>
        ${filteredMovs.map(m => `
            <div class="card" onclick="toggleSearch()">
                <div style="font-size:12px; color:var(--green)">$${m.monto} - ${m.categoria}</div>
                <div style="font-size:14px">${m.detalle || 'Sin detalle'}</div>
            </div>
        `).join('')}
        ${filteredNotas.map(n => `
            <div class="card" onclick="toggleSearch()">
                <div style="font-size:12px; color:var(--accent2)">Nota - ${n.fecha}</div>
                <div style="font-size:14px">${n.texto}</div>
            </div>
        `).join('')}
    `;
}

// --- LOGICA DE CUOTAS INTELIGENTE ---
function calculateInstallment(fechaCompra, cuotasTotales) {
    const inicio = new Date(fechaCompra);
    const ahora = new Date();
    // Calculamos meses de diferencia
    let meses = (ahora.getFullYear() - inicio.getFullYear()) * 12;
    meses += ahora.getMonth() - inicio.getMonth();
    const cuotaActual = meses + 1;
    
    if (cuotaActual > cuotasTotales) return null; // Ya terminó
    return { actual: cuotaActual, total: cuotasTotales };
}

// --- COPIA DE SEGURIDAD LOCAL ---
function exportBackup() {
    const backupData = {
        movimientos,
        notas,
        alacena,
        recordatorios,
        exportDate: new Date().toISOString()
    };
    const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `backup_app_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    showToast('Backup descargado correctamente');
}

// --- UI RENDERING ---
function renderMovimientos() {
    const list = document.getElementById('movList');
    list.innerHTML = movimientos.map(m => {
        const color = catColors[m.categoria] || 'var(--border2)';
        return `
            <div class="card">
                <div class="cat-indicator" style="background:${color}"></div>
                <div style="display:flex; justify-content:space-between">
                    <div>
                        <div style="font-weight:600">${m.detalle || m.categoria}</div>
                        <div style="font-size:11px; color:var(--text3)">${m.medio} · ${m.fecha}</div>
                    </div>
                    <div style="text-align:right">
                        <div style="font-weight:600; color:${m.tipo==='Salida'?'var(--red)':'var(--green)'}">
                            ${m.tipo==='Salida'?'-':'+'}$${m.monto.toLocaleString()}
                        </div>
                        ${m.cuotas > 1 ? `<div style="font-size:10px; color:var(--accent2)">Cuota planificada</div>` : ''}
                    </div>
                </div>
            </div>
        `;
    }).join('');
}

// Inicialización
async function startApp() {
    await loadMovimientos();
    // Aquí cargarías el resto de las funciones...
    document.getElementById('app').style.display = 'flex';
}

// Funciones de navegación, hamburger, etc se mantienen de tu versión...
function navigate(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tnav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('screen-' + screen).classList.add('active');
    // Actualizar botón activo...
}

window.onload = startApp;

</script>
</body>
</html>
